<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Validation Test</h1>
    <form action="#" method="POST" onsubmit="return false">
        <div>
            <label for="TH1">Trường hợp 1:</label>
            <input type="text" required value="">
        </div>
        
        <div>
            <label for="TH2">Trường hợp 2:</label>
            <input type="email" value="abc">
        </div>
        <div>
            <label for="TH3">Trường hợp 3:</label>
            <input type="number" min="1" max="10" value="15">
        </div>
        <div>
            <label for="TH4">Trường hợp 4:</label>
            <input type="text" pattern="[0-9]{10}" value="abc123">
        </div>
        <div>
            <label for="TH5">Trường hợp 5:</label>
            <input type="password" minlength="8" value="123">
        </div>
        <button type="submit">Submit</button>
    </form>

</body>

</html>
