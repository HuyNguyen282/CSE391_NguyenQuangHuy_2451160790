<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang media</title>
</head>

<body>
    <header>
        <h1>Trang media</h1>
    </header>
    <main>
        <section class="media-section">
            <p>Ảnh sản phẩm</p>
            <figure class="product-image">
                <div class="product-image-wrapper">
                    <img src="https://file.hstatic.net/200000925405/article/xsr155_tracker_customkit_6db724fe85934010853b2a221f3a162f.jpg"
                        alt="Xe máy XSR 155 " loading="lazy" width="400" height="400"
                        style="max-width: 100%; height: auto;">
                </div>
                <figcaption>Xe máy XSR 155</figcaption>
            </figure>
            <figure class="product-image">
                <div class="product-image-wrapper">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQGD0gUy44R27rNVf74nsN8QxpsKu7uiBUxbA&s"
                        alt="GPX Legend 150" loading="lazy" width="400" height="400"
                        style="max-width: 100%; height: auto;">
                </div>
                <figcaption>GPX Legend 150</figcaption>
            </figure>
            <figure class="product-image">
                <div class="product-image-wrapper">
                    <img src="https://xebaonam.com/data/media/1155/images/brixton-bx-150-6.jpg" alt="Brixton BX 150"
                        loading="lazy" width="400" height="400" style="max-width: 100%; height: auto;">
                </div>
                <figcaption>Brixton BX 150</figcaption>
            </figure>
        </section>
        <br><br>
        <section>
            <h3>Video</h3>
            <div class="video-wrapper">
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/nElK4NpBhi4" title="video review xe GPX Legend 150"
                        loading="lazy" width="560" height="315" allowfullscreen>
                    </iframe>
                </div>

            </div>
            <div class="video-wrapper">
                <div class="video-container">
                    <video controls
                        poster="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQGD0gUy44R27rNVf74nsN8QxpsKu7uiBUxbA&s"
                        width="560" height="315">
                        <source
                            src="a.mp4"
                            type="video/mp4">

                        <source
                            src="a.webm"
                            type="video/webm">
                        Trình duyệt của bạn không hỗ trợ phát video HTML5.
                    </video>
                    <br><br>
                </div>
            </div>
        </section>
        <section>
            <h3>âm thanh</h3>
            <div class="audio-section">
                <audio controls preload="metadata">
                    <source
                        src="a.mp3"
                        type="audio/mpeg">
                    Trình duyệt của bạn không hỗ trợ phát âm thanh HTML5.
                </audio>
            </div>
        </section>
        <section>
            <h3>SVG Logo</h3>
            <svg viewBox="0 0 100 100" width="100" height="100" xmlns="http://www.w3.org/2000/svg"
                aria-label="Logo hình tròn" role="img">
                <circle cx="50" cy="50" r="45" fill="#e8410a" />
                <text x="50" y="57" text-anchor="middle" font-size="28" font-weight="bold" fill="white"
                    font-family="sans-serif">Moto</text>
            </svg>
        </section>
    </main>
</body>

</html>
